<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Carpool</title>
    <link rel="stylesheet" href="css/fromTo.css">
    <link rel="stylesheet" href="css/style.css">
    <script type="application/javascript" src="dynamicStyling.js" defer></script>
    </head>
    <body>



    <div class="row">
        <label for ="from">Fra:</label>
        <select id="from">
            <option value="Nexo">Nexø</option>
            <option value="Ronne" selected>Rønne</option>
            <option value="Aakirkeby" >Aakirkeby</option>
            <option value="Svaneke" >Svaneke</option>
            <option value="Hasle" >Hasle</option>
            <option value="Allinge">Allinge</option>
            <option value="Gudhjem">Gudhjem</option>
        </select>

        <button id="toggleBtn">⇄</button>
        <label for ="to">Til:</label>
        <select id="to">

            <option value="Nexo">Nexø</option>
            <option value="Ronne">Rønne</option>
            <option value="Aakirkeby" >Aakirkeby</option>
            <option value="Svaneke" >Svaneke</option>
            <option value="Hasle" >Hasle</option>
            <option value="Allinge">Allinge</option>
            <option value="Gudhjem">Gudhjem</option>
        </select>
    </div>
    <div class = "container" id="preview"></div>

    <button id="next">Næste</button>
    <script>

        const role = sessionStorage.getItem("role");  //skal bruges i loaded script(dynamicStyling.js) der sætter baggrundsfarven, men også i dette script, til at tilpasse copy
        const from = document.querySelector("#from"); //
        const to = document.querySelector("#to");



        const date = new Date(sessionStorage.getItem("date")).toLocaleDateString("da-DK", {
            day: "2-digit",
            month: "2-digit",
            year: "numeric"
        });

        const preview = document.querySelector("#preview");
        const roleText = role == "driver" ? "Du tilbyder kørelejlighed d. " : "Du søger kørelejlighed d. ";
        preview.innerHTML = roleText + date;
        document.querySelector("#toggleBtn").addEventListener("click", () => {
            const temp = from.value;
            from.value = to.value;
            to.value = temp;
            syncDisabled();
        });

        //Forhindre at der står den samme værdi i begge

        function syncDisabled() {
            //sætter alle options i begge selectors til klikbar
            from.querySelectorAll("option").forEach(o => o.disabled = false);
            to.querySelectorAll("option").forEach(o => o.disabled = false);

             //finder den option der har værdien af den anden til at være ikke-klikbar
            //fx. hvis åkirkeby er valgt i den ene bliver den grå i den anden
            to.querySelector(`option[value="${from.value}"]`).disabled = true;
            from.querySelector(`option[value="${to.value}"]`).disabled = true;

            //hvis man vælger en anden by end rønne på et tidspunkt hvor der ikke står rønne i den anden, bliver from sat til rønne
            if (from.value !== "Ronne" && to.value !== "Ronne") {
                from.value = "Ronne";
                syncDisabled();
            }
        }

        from.addEventListener("change", syncDisabled);
        to.addEventListener("change", syncDisabled);

        syncDisabled();


        const nextButton = document.querySelector("#next");
        nextButton.addEventListener("click", ()=>{
            console.log(from);
            sessionStorage.setItem("from", from.value);
            sessionStorage.setItem("to", to.value);
            window.location.href = "preferences.html";
        });
    </script>

    </body>
    </html>
